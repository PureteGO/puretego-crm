<!-- Button to Trigger Modal -->
<!-- Included in parent -->

<!-- Main Logging Modal -->
<div class="modal fade" id="logInteractionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="interactionModalLabel">{{ _('Log Interaction') }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="logInteractionForm">
                    <input type="hidden" id="clientId" name="client_id" value="{{ client.id }}">
                    <input type="hidden" id="interactionId" name="interaction_id"> <!-- HIDDEN ID -->

                    <div class="mb-3">
                        <label class="form-label d-flex justify-content-between align-items-center">
                            {{ _('Type') }}
                            <a href="#" data-bs-toggle="modal" data-bs-target="#manageTypesModal"
                                class="small text-decoration-none">
                                <i class="bi bi-gear"></i> {{ _('Manage Types') }}
                            </a>
                        </label>
                        <select class="form-select" id="interactionType" name="type_id" required>
                            <!-- Populated via JS or server -->
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">{{ _('Date/Time') }}</label>
                        <input type="text" class="form-control flatpickr" id="interactionDate" name="date" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">{{ _('Notes') }}</label>
                        <textarea class="form-control" id="interactionNotes" name="notes" rows="3"></textarea>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="interactionDone" name="status" value="done"
                            checked>
                        <label class="form-check-label" for="interactionDone">
                            {{ _('Already done (mark as completed)') }}
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ _('Cancel') }}</button>
                <button type="button" class="btn btn-primary" onclick="submitInteraction()">{{ _('Save') }}</button>
            </div>
        </div>
    </div>
</div>

<!-- Suggestion Modal (Hidden by default) -->
<div class="modal fade" id="suggestionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-info">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title"><i class="bi bi-lightbulb"></i> {{ _('Next Step Suggestion') }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <p class="lead" id="suggestionMessage">...</p>
                <input type="hidden" id="suggestedTypeId">
                <input type="hidden" id="suggestedDate">
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-primary" onclick="acceptSuggestion()"><i
                        class="bi bi-calendar-check"></i> {{ _('Schedule') }}</button>
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">{{ _('No scheduling')
                    }}</button>
            </div>
        </div>
    </div>
</div>

<script>
    const modalTranslations = {
        registerInteraction: "{{ _('Log Interaction') }}",
        editInteraction: "{{ _('Edit Interaction') }}",
        scheduledViaSuggestion: "{{ _('Scheduled via automatic suggestion.') }}"
    };

    document.addEventListener('DOMContentLoaded', function () {
        // Set default date to now
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        // Flatpickr format: Y-m-d H:i
        document.getElementById('interactionDate').value = now.toISOString().slice(0, 16).replace('T', ' ');

        // Load Types
        fetch('/interactions/types')
            .then(r => r.json())
            .then(types => {
                const select = document.getElementById('interactionType');
                types.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.id;
                    opt.text = t.name;
                    select.appendChild(opt);
                });
            });

        // Reset modal on close
        document.getElementById('logInteractionModal').addEventListener('hidden.bs.modal', function () {
            document.getElementById('logInteractionForm').reset();
            document.getElementById('interactionId').value = '';
            document.getElementById('interactionModalLabel').textContent = modalTranslations.registerInteraction;
            document.getElementById('interactionDone').checked = true;
            // Reset date
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('interactionDate').value = now.toISOString().slice(0, 16).replace('T', ' ');
        });
    });

    function openEditModal(id, typeId, dateStr, notes, status) {
        document.getElementById('interactionId').value = id;
        document.getElementById('interactionType').value = typeId;
        document.getElementById('interactionNotes').value = notes;
        document.getElementById('interactionDone').checked = (status === 'done');
        document.getElementById('interactionModalLabel').textContent = modalTranslations.editInteraction;

        // Format date for datetime-local (yyyy-MM-ddThh:mm)
        const date = new Date(dateStr);
        date.setMinutes(date.getMinutes() - date.getTimezoneOffset()); // Adjust timezone
        // Flatpickr format: Y-m-d H:i
        document.getElementById('interactionDate').value = date.toISOString().slice(0, 16).replace('T', ' ');

        const modal = new bootstrap.Modal(document.getElementById('logInteractionModal'));
        modal.show();
    }

    function openEditModalFromData(element) {
        const id = element.dataset.id;
        const typeId = element.dataset.typeId;
        const dateStr = element.dataset.date;
        const notes = element.dataset.notes;
        const status = element.dataset.status;

        openEditModal(id, typeId, dateStr, notes, status);
    }

    function submitInteraction() {
        const interactionId = document.getElementById('interactionId').value;
        const isUpdate = !!interactionId;

        const formData = {
            client_id: document.getElementById('clientId').value,
            type_id: document.getElementById('interactionType').value,
            date: document.getElementById('interactionDate').value,
            notes: document.getElementById('interactionNotes').value,
            status: document.getElementById('interactionDone').checked ? 'done' : 'scheduled'
        };

        const url = isUpdate ? `/interactions/${interactionId}/update` : '/interactions/create';

        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify(formData)
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    // Close log modal
                    const logModal = bootstrap.Modal.getInstance(document.getElementById('logInteractionModal'));
                    logModal.hide();

                    // Check for suggestion (Only on Create)
                    if (!isUpdate && data.suggestion) {
                        document.getElementById('suggestionMessage').textContent = data.suggestion.message;
                        document.getElementById('suggestedTypeId').value = data.suggestion.type_id;
                        document.getElementById('suggestedDate').value = data.suggestion.date;

                        const suggModal = new bootstrap.Modal(document.getElementById('suggestionModal'));
                        suggModal.show();
                    } else {
                        location.reload(); // Refresh to show changes
                    }
                } else {
                    alert('Error: ' + data.message);
                }
            });
    }

    function acceptSuggestion() {
        const typeId = document.getElementById('suggestedTypeId').value;
        const date = document.getElementById('suggestedDate').value;
        const notes = modalTranslations.scheduledViaSuggestion;

        const formData = {
            client_id: document.getElementById('clientId').value,
            type_id: typeId,
            date: date,
            notes: notes,
            status: 'scheduled'
        };

        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

        fetch('/interactions/create', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify(formData)
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    location.reload();
                }
            });
    }
</script>
