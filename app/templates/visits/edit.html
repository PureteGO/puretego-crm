{% extends "base.html" %}

{% block title %}{{ _('Edit Visit') }} - {{ visit.client.name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-pencil-square"></i> {{ _('Edit Visit') }}</h5>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('visits.edit', visit_id=visit.id) }}" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label class="form-label">{{ _('Client') }}</label>
                            <input type="text" class="form-control" value="{{ visit.client.name }}" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">{{ _('Visit Date & Time') }}</label>
                            <input type="text" class="form-control flatpickr-datetime" name="visit_date"
                                value="{{ visit.visit_date|format_date('%Y-%m-%d %H:%M') }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">{{ _('Observations / Notes') }}</label>
                            <textarea name="notes" class="form-control" rows="4">{{ visit.notes or '' }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">{{ _('Next Step') }}</label>
                            <input type="text" name="next_step" class="form-control"
                                value="{{ visit.next_step or '' }}">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">{{ _('Save Changes') }}</button>
                            <a href="{{ url_for('visits.view', visit_id=visit.id) }}"
                                class="btn btn-outline-secondary">{{ _('Cancel') }}</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
