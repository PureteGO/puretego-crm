{% extends "base.html" %}

{% block title %}{{ _('Log Visit') }} - {{ selected_client.name if selected_client else _('New') }}{% endblock %}


{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="bi bi-calendar-event"></i> {{ _('Log New Visit') }}</h5>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('visits.create') }}" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        {% if not selected_client %}
                        <div class="mb-3">
                            <label class="form-label">{{ _('Client') }}</label>
                            <select name="client_id" class="form-select" required>
                                <option value="">{{ _('Select a client...') }}</option>
                                {% for client in clients %}
                                <option value="{{ client.id }}">{{ client.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        {% else %}
                        <input type="hidden" name="client_id" value="{{ selected_client.id }}">
                        <div class="mb-3">
                            <label class="form-label">{{ _('Client') }}</label>
                            <input type="text" class="form-control" value="{{ selected_client.name }}" readonly>
                        </div>
                        {% endif %}

                        <div class="mb-3">
                            <label class="form-label">{{ _('Visit Date & Time') }}</label>
                            <input type="text" class="form-control flatpickr-datetime" name="visit_date"
                                value="{{ now|format_date('%Y-%m-%d %H:%M') }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">{{ _('Observations / Notes') }}</label>
                            <textarea name="notes" class="form-control" rows="4"
                                placeholder="{{ _('What was discussed with the client? What problems were detected?') }}"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">{{ _('Next Step / Commitment') }}</label>
                            <input type="text" name="next_step" class="form-control"
                                placeholder="{{ _('e.g., Send proposal, Call back on Tuesday...') }}">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">{{ _('Log Visit') }}</button>
                            <a href="{{ url_for('clients.view', client_id=selected_client.id) if selected_client else url_for('visits.index') }}"
                                class="btn btn-outline-secondary">{{ _('Cancel') }}</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
