# Deploy to cPanel (Triggered after secrets update)
name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🚀 Deploy to Production (app2)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: app2.maps2go.online
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: /app2.maps2go.online/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/__pycache__/**
          venv/**
          .env
          tests/**
          scripts/**
          TASK_SAAS_ROADMAP.md
          implementation_plan.md
          walkthrough.md
          task.md
